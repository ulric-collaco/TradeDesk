name = "tradedesk-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "tradedesk-db"
database_id = "9aa03816-fcac-4bda-815b-953c73bf6deb"
# Run: wrangler d1 create tradedesk-db

[[kv_namespaces]]
binding = "KV"
id = "9c342f1775d54a91ab81511e489ab9cc"
# Run: wrangler kv:namespace create TRADEDESK_KV

[vars]
JWT_EXPIRY = "86400"
# Set JWT_SECRET securely: wrangler secret put JWT_SECRET
