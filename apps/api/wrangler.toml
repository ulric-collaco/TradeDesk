name = "tradedesk-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "tradedesk-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"
# Run: wrangler d1 create tradedesk-db

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_ID"
# Run: wrangler kv:namespace create TRADEDESK_KV

[vars]
JWT_EXPIRY = "86400"
# Set JWT_SECRET securely: wrangler secret put JWT_SECRET
